<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canopy.ag | Autonomous Harvesting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0C1E16] text-white min-h-screen font-sans">

    <header class="relative p-6 md:p-8">
        <img src="Vierkant logo+tekst_nobg.png" alt="Canopy Logo" class="absolute top-6 left-6 h-16 md:h-20 w-auto rounded-lg z-10">
        <div class="flex justify-center">
            <img src="Banner_nobg.png" alt="Canopy Header" class="h-64 md:h-80 w-auto rounded-lg">
        </div>
    </header>

    <main class="flex items-center justify-center pt-8 md:pt-12 px-6">
        <div class="text-center max-w-4xl">

            <p class="text-slate-300 text-xl md:text-2xl mb-12 max-w-2xl mx-auto">
                Our mission is to equip farmers with data-driven robotic solutions to meet the ever-increasing demand for sustainable food production.  
            </p>
            
            <form action="YOUR_FORMSPREE_ENDPOINT_HERE" method="POST" class="flex flex-col sm:flex-row gap-3 justify-center items-center">
                <input type="email" name="email" required placeholder="Enter your email" class="px-6 py-4 rounded-xl bg-black/20 border border-white/10 focus:outline-none focus:ring-2 focus:ring-emerald-500 w-full sm:w-80 text-white text-lg placeholder:text-slate-500">
                <button type="submit" class="text-white px-8 py-4 rounded-xl font-semibold text-lg transition duration-150 shadow-md" style="background-color: #71867C;" onmouseover="this.style.backgroundColor='#5f6d66'" onmouseout="this.style.backgroundColor='#71867C'">
                    Learn more?
                </button>
            </form>
        </div>
    </main>

</body>
</html>
